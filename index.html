<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>AHS NETWORK GROUP</title>

<!-- CSS FILES -->

<link rel="stylesheet" href="./css/background.css">
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/cards.css">

<!-- GOOGLE FONT -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet"
/>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg">
<div class="grid"></div>
</div>

<!-- MAIN CONTAINER -->

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="logo">
👑
</div>

<h1 class="title">
AHS NETWORK GROUP
</h1>

<p class="subtitle">
Premium SMS Leaderboard Dashboard
</p>

</div>

<!-- TOP STATS -->

<div class="topbar">

<div class="topCard">

<h2 id="userCount">
0
</h2>

<p>
Total Users
</p>

</div>

<div class="topCard">

<h2 id="totalSms">
0
</h2>

<p>
Total SMS
</p>

</div>

<div class="topCard">

<h2 id="totalEarn">
$0
</h2>

<p>
Total Earnings
</p>

</div>

</div>

<!-- SEARCH -->

<div class="searchWrap">

<div class="searchBox">

<div class="searchIcon">
🔍
</div>

<input
type="text"
id="search"
class="searchInput"
placeholder="Search user..."
autocomplete="off"
/>

</div>

</div>

<!-- LEADERBOARD -->

<div id="list"></div>

<!-- FOOTER -->

<div class="footer">

Powered By
<span>
AHS SHOVON
</span>

</div>

</div>

<!-- JAVASCRIPT -->

<script src="./js/leaderboard-data.js"></script>
<script src="./js/commission-system.js"></script>
