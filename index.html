<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>AHS NETWORK GROUP</title>

<link rel="stylesheet" href="./css/background.css">
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/cards.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet"
/>

</head>

<body>

<div class="bg">
<div class="grid"></div>
</div>

<div class="container">

<div class="header">

<div class="logo">
👑
</div>

<h1 class="title">
AHS NETWORK GROUP
</h1>

<p class="subtitle">
Premium SMS Leaderboard Dashboard
</p>

</div>

<div class="topbar">

<div class="topCard">

<h2 id="userCount">
0
</h2>

<p>
Total Users
</p>

</div>

<div class="topCard">

<h2 id="totalSms">
0
</h2>

<p>
Total SMS
</p>

</div>

<div class="topCard">

<h2 id="totalEarn">
$0
</h2>

<p>
Total Earnings
</p>

</div>

</div>

<div class="filterWrap">

<button
id="dailyBtn"
class="filterBtn active"
>
🔥 Daily
</button>

<button
id="weeklyBtn"
class="filterBtn"
>
📅 Weekly
</button>

<button
id="alltimeBtn"
class="filterBtn"
>
👑 All Time
</button>

</div>

<div class="updateBox">

<h3>
🔥 Latest Update
</h3>

<p id="updateText">
Loading...
</p>

</div>

<div class="searchWrap">

<div class="searchBox">

<div class="searchIcon">
🔍
</div>

<input
type="text"
id="search"
class="searchInput"
placeholder="Search user..."
autocomplete="off"
/>

</div>

</div>

<div id="list"></div>

<div class="footer">

Powered By
<span>
AHS SHOVON
</span>

</div>

</div>

<script src="./js/commission-system.js"></script>

<script src="./js/leaderboard-data.js"></script>

<script src="./js/weekly-data.js"></script>

<script src="./js/alltime-data.js"></script>

<script src="./js/payment-info.js"></script>

<script src="./js/main.js"></script>

</body>
</html>
