<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>AHS NETWORK GROUP</title>

<!-- CSS -->

<link rel="stylesheet" href="./css/background.css">
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/cards.css">

<!-- FONT -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet"
/>

</head>

<body>

<!-- =========================
PREMIUM BACKGROUND
========================= -->

<div class="bg">

<!-- AURORA -->

<div class="aurora leftAurora"></div>

<div class="aurora rightAurora"></div>

<!-- GRID -->

<div class="grid"></div>

<!-- HEXAGON -->

<div class="hex"></div>

<!-- STARS -->

<div class="stars">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

<!-- FRAME -->

<div class="frame"></div>

<!-- FLOOR RING -->

<div class="floorRing"></div>

<!-- NOISE -->

<div class="noise"></div>

</div>

<!-- =========================
MAIN CONTAINER
========================= -->

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="logo">
👑
</div>

<h1 class="title">
AHS NETWORK GROUP
</h1>

<p class="subtitle">
Premium SMS Leaderboard Dashboard
</p>

</div>

<!-- TOPBAR -->

<div class="topbar">

<div class="topCard">

<h2 id="userCount">
0
</h2>

<p>
Total Users
</p>

</div>

<div class="topCard">

<h2 id="totalSms">
0
</h2>

<p>
Total SMS
</p>

</div>

<div class="topCard">

<h2 id="totalEarn">
$0
</h2>

<p>
Total Earnings
</p>

</div>

</div>

<!-- FILTER -->

<div class="filterWrap">

<button
id="dailyBtn"
class="filterBtn active"
>

🔥 Daily

</button>

<button
id="weeklyBtn"
class="filterBtn"
>

📅 Weekly

</button>

<button
id="alltimeBtn"
class="filterBtn"
>

👑 All Time

</button>

</div>

<!-- UPDATE -->

<div class="updateBox">

<h3>
🔥 Latest Update
</h3>

<p id="updateText">
Loading...
</p>

</div>

<!-- SEARCH -->

<div class="searchWrap">

<div class="searchBox">

<div class="searchIcon">
🔍
</div>

<input
type="text"
id="search"
class="searchInput"
placeholder="Search user..."
autocomplete="off"
/>

</div>

</div>

<!-- LEADERBOARD -->

<div id="list"></div>

<!-- FOOTER -->

<div class="footer">

Powered By
<span>
AHS SHOVON
</span>

</div>

</div>

<!-- =========================
PAYMENT MODAL
========================= -->

<div
id="paymentModal"
class="paymentModal"
>

<div class="paymentBox">

<button
id="closePayment"
class="closePayment"
>
×
</button>

<h2 id="paymentName">
User
</h2>

<!-- BKASH -->

<div
id="bkashCard"
class="payCard bkashCard"
>

<div class="payTitle">
💳 Bkash Number
</div>

<div
id="bkashText"
class="payValue"
>
N/A
</div>

</div>

<!-- BINANCE -->

<div
id="binanceCard"
class="payCard binanceCard"
>

<div class="payTitle">
🟡 Binance UID
</div>

<div
id="binanceText"
class="payValue"
>
N/A
</div>

</div>

<!-- MESSAGE -->

<div
id="paymentMessage"
class="paymentMessage"
>

No payment info added yet.

</div>

</div>

</div>

<!-- =========================
JAVASCRIPT
========================= -->

<script src="./js/commission-system.js"></script>

<script src="./js/payment-info.js"></script>

<script src="./js/update-info.js"></script>

<script src="./js/leaderboard-data.js"></script>

<script src="./js/weekly-data.js"></script>

<script src="./js/alltime-data.js"></script>

<script src="./js/main.js"></script>

</body>
</html>
